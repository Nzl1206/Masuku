<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Love Alert</title>
    <style>
      body {
        margin: 0;
        padding: 0;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background: linear-gradient(135deg, #fce4ec, #f8bbd0);
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
      }

      .container {
        background: white;
        padding: 40px;
        border-radius: 16px;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
        text-align: center;
        width: 300px;
      }

      h2 {
        color: #e91e63;
        margin-bottom: 20px;
      }

      input {
        width: 100%;
        padding: 10px;
        font-size: 16px;
        border: 2px solid #e91e63;
        border-radius: 8px;
        margin-bottom: 20px;
        outline: none;
      }

      button {
        background-color: #e91e63;
        color: white;
        border: none;
        padding: 10px 20px;
        font-size: 16px;
        border-radius: 8px;
        cursor: pointer;
        transition: background 0.3s;
      }

      button:hover {
        background-color: #d81b60;
      }

      #message {
        margin-top: 20px;
        font-size: 18px;
        color: #4a148c;
        font-weight: bold;
      }
      
p {font-size: 18px;
        opacity: 0.7;
        text-align: center;
        font-family: monospace;}
    
    </style>
  </head>
  <body>
    <div class="container">
      <h2>Enter Your Name</h2>
      <input type="text" id="nameInput" placeholder="Enter name" />
      <button onclick="checkName()">Submit</button>
      <div id="message"></div>
    </div>
<p> Coded by Ndzalama Lubisi</p>
    <script>
      function checkName() {
        let name = document.getElementById("nameInput").value.trim();
        let messageBox = document.getElementById("message");

        if (name.toLowerCase() === "siphumelele") {
          messageBox.innerHTML = "Hey Uncle Gandpa, I miss you! ❤️";
        } else {
          messageBox.innerHTML = "Access Denied ❌";
        }
      }
    </script>
  </body>
</html>
